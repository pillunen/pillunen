<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>streets</title>

<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0e0e0e;
color:#f2f2ee;
font-family:'Inter Tight',sans-serif;
margin:0;
cursor:none;
}

.gallery{
column-count:3;
column-gap:20px;
padding:60px;
}

.gallery img{
width:100%;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="gallery" id="gallery"></div>

<script>

const images=[

"streets/bucuresti (1).jpg",
"streets/bucuresti (2).jpg",
"streets/bucuresti (3).jpg",
"streets/bucuresti (4).jpg",
"streets/bucuresti (5).jpg",
"streets/bucuresti (6).jpg",
"streets/bucuresti (7).jpg",
"streets/bucuresti (8).jpg",
"streets/paris (1).jpg",
"streets/paris (2).jpg",
"streets/paris (3).jpg",
"streets/paris (4).jpg",
"streets/paris (5).jpg"

];

const gallery=document.getElementById("gallery");

images.forEach(file=>{
const img=document.createElement("img");
img.src=file;
gallery.appendChild(img);
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0e0e0e;
margin:0;
font-family:'Inter Tight',sans-serif;
cursor:none;
animation:fade .6s;
}

@keyframes fade{from{opacity:0}to{opacity:1}}

.cursor{
position:fixed;
width:18px;
height:18px;
background:white;
clip-path:path("M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4 8 4 9.5 5 10.24 6.36 11 5 12.5 4 14 4 16.5 4 18.5 6 18.5 8.5c0 3.78-3.4 6.86-8.55 11.54z");
box-shadow:0 0 10px white;
pointer-events:none;
z-index:2000;
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

.gallery{
column-count:3;
column-gap:20px;
padding:80px 60px;
}

.gallery img{
width:100%;
margin-bottom:20px;
cursor:pointer;
}

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
}

#viewer img{
max-width:90%;
max-height:90%;
}

.arrow{
position:absolute;
top:50%;
font-size:40px;
color:white;
cursor:pointer;
}

.left{left:40px}
.right{right:40px}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="menu-btn" onclick="location.href='index.html'">☰</div>

<div class="gallery" id="gallery"></div>

<div id="viewer">
<div class="arrow left" onclick="prev()">‹</div>
<img id="viewer-img">
<div class="arrow right" onclick="next()">›</div>
</div>

<script>

const images=[

"streets/bucuresti (1).jpg",
"streets/bucuresti (2).jpg",
"streets/bucuresti (3).jpg",
"streets/bucuresti (4).jpg",
"streets/bucuresti (5).jpg",
"streets/bucuresti (6).jpg",
"streets/bucuresti (7).jpg",
"streets/bucuresti (8).jpg",
"streets/paris (1).jpg",
"streets/paris (2).jpg",
"streets/paris (3).jpg",
"streets/paris (4).jpg",
"streets/paris (5).jpg"

];

const gallery=document.getElementById("gallery");

images.forEach(file=>{
const img=document.createElement("img");
img.src=file;
gallery.appendChild(img);
});

let current=0;

const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("viewer-img");

gallery.addEventListener("click",e=>{
if(e.target.tagName==="IMG"){
current=[...gallery.children].indexOf(e.target);
viewer.style.display="flex";
viewerImg.src=images[current];
}
});

function next(){
current=(current+1)%images.length;
viewerImg.src=images[current];
}

function prev(){
current=(current-1+images.length)%images.length;
viewerImg.src=images[current];
}

viewer.onclick=()=>viewer.style.display="none";

document.addEventListener("keydown",e=>{
if(e.key==="ArrowRight")next();
if(e.key==="ArrowLeft")prev();
if(e.key==="Escape")viewer.style.display="none";
});

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

</script>

</body>
</html>

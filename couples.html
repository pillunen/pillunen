<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>couples</title>

<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0e0e0e;
color:#f2f2ee;
font-family:'Inter Tight',sans-serif;
margin:0;
cursor:none;
}

/* film grain */

.grain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
opacity:.05;
pointer-events:none;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
}

/* heart cursor */

.cursor{
position:fixed;
width:18px;
height:18px;
background:white;
clip-path:path("M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4 8 4 9.5 5 10.24 6.36 11 5 12.5 4 14 4 16.5 4 18.5 6 18.5 8.5c0 3.78-3.4 6.86-8.55 11.54z");
box-shadow:0 0 10px white;
pointer-events:none;
}

/* gallery */

.gallery{
column-count:3;
column-gap:20px;
padding:60px;
}

.gallery img{
width:100%;
margin-bottom:20px;
cursor:pointer;
filter:blur(10px);
transition:.6s;
}

.gallery img.loaded{
filter:blur(0);
}

/* lightbox */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

.arrow{
position:absolute;
top:50%;
font-size:40px;
cursor:pointer;
}

.left{left:40px}
.right{right:40px}

</style>

</head>

<body>

<div class="grain"></div>
<div class="cursor" id="cursor"></div>

<div class="gallery" id="gallery"></div>

<div id="lightbox">

<div class="arrow left" onclick="prev()">‹</div>

<img id="lightbox-img">

<div class="arrow right" onclick="next()">›</div>

</div>

<script>

/* couples image list */

const images=[

"couples/backwordvxd.jpg",
"couples/doublevxd.jpg",
"couples/tripplevxd.jpg",
"couples/upfrontvxd.jpg",
"couples/vxdblack.jpg",
"couples/vxdlayingclose.jpg",
"couples/vxdlayingfar.jpg"

];

/* build gallery */

const gallery=document.getElementById("gallery");

images.forEach(file=>{
const img=document.createElement("img");
img.src=file;
img.loading="lazy";
gallery.appendChild(img);

img.onload=()=>img.classList.add("loaded");
});

/* cursor */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* lightbox */

let current=0;

const lightbox=document.getElementById("lightbox");
const lightImg=document.getElementById("lightbox-img");

document.addEventListener("click",e=>{
if(e.target.tagName==="IMG" && e.target.parentNode.id==="gallery"){
current=[...gallery.children].indexOf(e.target);
open();
}
});

function open(){
lightbox.style.display="flex";
lightImg.src=images[current];
}

function next(){
current=(current+1)%images.length;
lightImg.src=images[current];
}

function prev(){
current=(current-1+images.length)%images.length;
lightImg.src=images[current];
}

lightbox.onclick=()=>lightbox.style.display="none";

/* keyboard navigation */

document.addEventListener("keydown",e=>{
if(e.key==="ArrowRight")next();
if(e.key==="ArrowLeft")prev();
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pill.unen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0e0e0e;
color:#f2f2ee;
font-family:'Inter Tight',sans-serif;
margin:0;
cursor:none;
transition:opacity .4s;
}

/* film grain */

.grain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
opacity:.05;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
}

/* heart cursor */

.cursor{
position:fixed;
width:18px;
height:18px;
background:white;
clip-path:path("M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4 8 4 9.5 5 10.24 6.36 11 5 12.5 4 14 4 16.5 4 18.5 6 18.5 8.5c0 3.78-3.4 6.86-8.55 11.54z");
box-shadow:0 0 10px white;
pointer-events:none;
}

/* header */

header{
text-align:center;
padding:80px 20px 40px;
}

/* gallery */

.gallery{
column-count:3;
column-gap:20px;
padding:40px 60px;
}

.gallery img{
width:100%;
margin-bottom:20px;
filter:blur(10px);
transition:.6s;
}

.gallery img.loaded{
filter:blur(0);
}

/* about */

.about{
display:flex;
align-items:center;
gap:60px;
padding:100px;
}

.about img{
width:300px;
}

.aboutText{
font-size:28px;
max-width:600px;
}

/* lightbox */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

.arrow{
position:absolute;
top:50%;
font-size:40px;
cursor:pointer;
}

.left{left:40px}
.right{right:40px}

</style>
</head>

<body>

<div class="grain"></div>
<div class="cursor" id="cursor"></div>

<header>

<h1>PILL.UNEN</h1>
<div style="opacity:.6">photography</div>

</header>

<section class="gallery">

<img src="portraits/me2.jpg" loading="lazy">
<img src="portraits/vari.jpg" loading="lazy">
<img src="couples/backwordvxd.jpg" loading="lazy">
<img src="couples/doublevxd.jpg" loading="lazy">

</section>

<section class="about">

<img src="portraits/me2.jpg">

<div class="aboutText">
sofia is a monochrome photographer based in finland & available worldwide
</div>

</section>

<div id="lightbox">

<div class="arrow left" onclick="prev()">‹</div>

<img id="lightbox-img">

<div class="arrow right" onclick="next()">›</div>

</div>

<script>

/* cursor */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* progressive loading */

document.querySelectorAll("img").forEach(img=>{
img.onload=()=>img.classList.add("loaded");
});

/* lightbox */

const images=[...document.querySelectorAll(".gallery img")];

let current=0;

const lightbox=document.getElementById("lightbox");
const lightImg=document.getElementById("lightbox-img");

images.forEach((img,i)=>{
img.onclick=()=>{
current=i;
open();
};
});

function open(){
lightbox.style.display="flex";
lightImg.src=images[current].src;
}

function next(){
current=(current+1)%images.length;
lightImg.src=images[current].src;
}

function prev(){
current=(current-1+images.length)%images.length;
lightImg.src=images[current].src;
}

lightbox.onclick=()=>lightbox.style.display="none";

/* keyboard navigation */

document.addEventListener("keydown",e=>{
if(e.key==="ArrowRight")next();
if(e.key==="ArrowLeft")prev();
});

</script>

</body>
</html>

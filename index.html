<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>pill.unen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0e0e0e;
color:#f2f2ee;
font-family:'Inter Tight',sans-serif;
margin:0;
cursor:none;
animation:fade .6s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* cursor */

.cursor{
position:fixed;
width:18px;
height:18px;
background:white;
clip-path:path("M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4 8 4 9.5 5 10.24 6.36 11 5 12.5 4 14 4 16.5 4 18.5 6 18.5 8.5c0 3.78-3.4 6.86-8.55 11.54z");
box-shadow:0 0 12px white;
pointer-events:none;
z-index:2000;
}

/* menu */

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

#menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#0e0e0e;
padding-top:120px;
transition:.4s;
z-index:999;
}

#menu a{
display:block;
padding:20px 40px;
color:#f2f2ee;
text-decoration:none;
font-size:18px;
}

/* clock */

.clock{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
font-size:14px;
opacity:.7;
}

/* language buttons */

.languages{
position:fixed;
top:35px;
left:50%;
transform:translateX(-50%);
font-size:12px;
letter-spacing:2px;
opacity:.8;
}

.languages span{
margin:0 6px;
cursor:pointer;
}

.languages span:hover{
opacity:.6;
}

/* about */

.about{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
gap:80px;
padding:40px;
}

.about img{
width:420px;
}

.about-text{
font-size:28px;
max-width:420px;
line-height:1.4;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="menu">

<a href="index.html">home</a>
<a href="portraits.html">portraits</a>
<a href="streets.html">streets</a>
<a href="concerts.html">concerts</a>
<a href="couples.html">couples</a>
<a href="contact.html">booking & contact</a>

</div>

<div class="clock" id="clock"></div>

<div class="languages">
<span onclick="setLang('en')">EN</span>
<span onclick="setLang('fi')">FI</span>
<span onclick="setLang('ua')">UA</span>
<span onclick="setLang('ru')">RU</span>
</div>

<section class="about">

<img src="portraits/me2.jpg">

<div class="about-text" id="aboutText">
sofia is a monochrome photographer based in finland & available worldwide
</div>

</section>

<script>

/* menu */

function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left==="0px" ? "-260px" : "0px";
}

/* cursor */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* clock */

function updateClock(){
const now=new Date();
let h=String(now.getHours()).padStart(2,"0");
let m=String(now.getMinutes()).padStart(2,"0");
let s=String(now.getSeconds()).padStart(2,"0");
clock.innerText=h+"."+m+"."+s;
}

setInterval(updateClock,1000);
updateClock();

/* language switch */

function setLang(lang){

const text=document.getElementById("aboutText");

if(lang==="en"){
text.innerText="sofia is a monochrome photographer based in finland & available worldwide";
}

if(lang==="fi"){
text.innerText="sofia on mustavalkovalokuvaaja suomesta ja työskentelee maailmanlaajuisesti";
}

if(lang==="ua"){
text.innerText="софія — монохромна фотографка з фінляндії, доступна для зйомок по всьому світу";
}

if(lang==="ru"){
text.innerText="софия — монохромный фотограф из финляндии, доступна для съёмок по всему миру";
}

}

</script>

</body>
</html>

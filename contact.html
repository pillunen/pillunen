<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>booking & contact</title>

<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0e0e0e;
color:#f2f2ee;
font-family:'Inter Tight',sans-serif;
margin:0;
cursor:none;
animation:fade .6s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* heart cursor */

.cursor{
position:fixed;
width:18px;
height:18px;
background:white;
clip-path:path("M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4 8 4 9.5 5 10.24 6.36 11 5 12.5 4 14 4 16.5 4 18.5 6 18.5 8.5c0 3.78-3.4 6.86-8.55 11.54z");
box-shadow:0 0 10px white;
pointer-events:none;
z-index:2000;
}

/* menu */

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

#menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#0e0e0e;
padding-top:120px;
transition:.4s;
z-index:999;
}

#menu a{
display:block;
padding:20px 40px;
color:#f2f2ee;
text-decoration:none;
font-size:18px;
}

/* contact layout */

.contact-container{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
gap:18px;
font-size:20px;
}

.contact-container a{
color:#f2f2ee;
text-decoration:none;
}

.contact-container a:hover{
opacity:0.6;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="menu">

<a href="index.html">home</a>
<a href="portraits.html">portraits</a>
<a href="streets.html">streets</a>
<a href="concerts.html">concerts</a>
<a href="couples.html">couples</a>
<a href="contact.html">booking & contact</a>

</div>

<div class="contact-container">

<div>booking & contact</div>

<div>email: ilonasofiavagner@gmail.com</div>

<div>
instagram:
<a href="https://www.instagram.com/pill.unen/" target="_blank">
@pill.unen
</a>
</div>

<div>phone: 0469053559</div>

<div>city: oulu</div>

<div>
<a href="https://calendly.com/ilonasofiavagner/30min" target="_blank">
book your time slot
</a>
</div>

</div>

<script>

/* menu */

function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left==="0px" ? "-260px" : "0px";
}

/* cursor */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

</script>

</body>
</html>

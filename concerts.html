<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>concerts</title>

<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0e0e0e;
color:#f2f2ee;
font-family:'Inter Tight',sans-serif;
margin:0;
}

.gallery{
column-count:3;
column-gap:20px;
padding:60px;
}

.gallery img{
width:100%;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="gallery" id="gallery"></div>

<script>

const images=[

"concerts/batumi (1).jpg",
"concerts/batumi (2).jpg",
"concerts/batumi (3).jpg",
"concerts/batumi (4).jpg",
"concerts/batumi (5).jpg",
"concerts/batumi (6).jpg",
"concerts/batumi (8).jpg",
"concerts/batumi (10).jpg",
"concerts/framedlit1.jpg",
"concerts/framedlit2.jpg",
"concerts/framedlit4.jpg",
"concerts/framedlit5.jpg",
"concerts/hk1.jpg",
"concerts/hk2.jpg",
"concerts/hk3.jpg",
"concerts/hk4.jpg",
"concerts/hk9.jpg",
"concerts/hk10.jpg",
"concerts/hk11.jpg",
"concerts/hk12.jpg",
"concerts/hk13.jpg",
"concerts/hk14.jpg"

];

const gallery=document.getElementById("gallery");

images.forEach(file=>{
const img=document.createElement("img");
img.src=file;
gallery.appendChild(img);
});

</script>

</body>
</html>
